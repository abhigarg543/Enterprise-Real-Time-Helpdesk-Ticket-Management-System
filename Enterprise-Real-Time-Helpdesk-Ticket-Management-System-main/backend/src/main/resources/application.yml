server:
  port: 8080

spring:
  application:
    name: HelpDeskPro

  datasource:
    url: jdbc:postgresql://localhost:5432/HelpDeskPro_ds
    username: postgres
    password: root # Set to your pgAdmin postgres password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970 # Strong 256-bit hex key
    expirationMs: 86400000 # 24 hours
